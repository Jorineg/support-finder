<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo – Support Finder on TU Berlin</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
      iframe { width: 100%; height: 100%; border: none; }
      .demo-banner {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 200000;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        text-align: center;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.02em;
        box-shadow: 0 2px 12px rgba(99,102,241,0.3);
      }
      .demo-banner strong { font-weight: 700; }
      iframe { margin-top: 34px; height: calc(100% - 34px); }
    </style>
  </head>
  <body>
    <div class="demo-banner">
      <strong>PROTOTYPE DEMO</strong> — Support Finder widget embedded on TU Berlin website
    </div>
    <iframe src="/www.tu.berlin/en/index.html"></iframe>
    <script type="module" src="/src/widget.js"></script>
  </body>
</html>
